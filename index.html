<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>身份验证 - 德语B2写作训练营</title>
    
    <!-- 引入 Tailwind CSS（与你的主页面保持高质感设计同步） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        body {
            background-color: #FAFAFA;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            color: #111827;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.01em;
        }

        .premium-input {
            background: #FFFFFF;
            border: 1px solid rgba(229, 231, 235, 0.8);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .premium-input:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-5 antialiased bg-[#FDFDFD]">

    <div class="w-full max-w-[400px] relative z-10">
        
        <!-- 登录卡片容器 -->
        <div class="relative p-8 rounded-[28px] bg-white border border-neutral-100 shadow-[0_12px_40px_rgba(0,0,0,0.03)] overflow-hidden">
            <div class="absolute -right-12 -top-12 w-32 h-32 bg-indigo-100/40 rounded-full blur-2xl pointer-events-none"></div>
            <div class="absolute -left-12 -bottom-12 w-32 h-32 bg-amber-50/50 rounded-full blur-2xl pointer-events-none"></div>
            
            <div class="relative z-10">
                <!-- 头部徽章 -->
                <div class="flex justify-center">
                    <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[9px] font-extrabold tracking-widest bg-neutral-900 text-neutral-100 shadow-sm uppercase">
                        <span>GEHTALLES DEUTSCH</span>
                    </div>
                </div>
                
                <h1 class="text-2xl font-[900] text-center text-neutral-900 mt-5 mb-2 tracking-tight">
                    专属训练营通道
                </h1>
                <p class="text-xs text-center text-neutral-400 font-medium mb-8">
                    请输入授权凭证以开启 B2 高分特训
                </p>

                <!-- 表单处理 -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2 px-1">Access Token / 访问密码</label>
                        <input 
                            type="password" 
                            id="token-input" 
                            placeholder="请输入通关密码" 
                            class="premium-input w-full px-4 py-3.5 text-sm font-medium tracking-wide text-neutral-800 placeholder-neutral-300"
                            onkeydown="if(event.key==='Enter') verifyToken()"
                        >
                    </div>

                    <!-- 错误提示（默认隐藏） -->
                    <div id="error-msg" class="text-xs text-rose-500 font-bold px-1 hidden transition-all flex items-center gap-1">
                        <span class="w-1 h-1 rounded-full bg-rose-500 animate-pulse"></span>
                        密码错误或授权已过期，请联系刘老师
                    </div>

                    <!-- 验证按钮 -->
                    <button 
                        onclick="verifyToken()" 
                        class="w-full mt-2 py-3.5 bg-gradient-to-r from-neutral-900 to-neutral-800 active:scale-[0.98] text-white text-sm font-bold rounded-2xl shadow-sm transition-all tracking-wide"
                    >
                        验证并进入系统
                    </button>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-[9px] text-neutral-400 font-bold tracking-widest uppercase">© 2026 GEHTALLES DEUTSCH教研室</p>
        </footer>
    </div>

    <script>
        // 在页面加载时，如果检查到已经有正确的 token，直接帮用户跳转，省去重复输入的麻烦
        window.onload = function() {
            if (localStorage.getItem('map_access') === "Hallo2026") {
                // 请确保这里的文件名和你的B2主页面文件名完全一致（例如 b2-camp.html）
                window.location.href = "b2-camp.html"; 
            }
        }

        function verifyToken() {
            const inputVal = document.getElementById('token-input').value.trim();
            const errorMsg = document.getElementById('error-msg');

            // 对应主页面的安全检测口令
            if (inputVal === "Hallo2026") {
                errorMsg.classList.add('hidden');
                // 核心：成功时注入本地缓存，打通大门
                localStorage.setItem('map_access', 'Hallo2026');
                
                // 验证成功后丝滑跳转到主列表页
                // 【注意】请将下面的 "b2-camp.html" 修改为你实际的B2主页网页文件名
                window.location.href = "b2-camp.html";
            } else {
                // 密码错误提示
                errorMsg.classList.remove('hidden');
                document.getElementById('token-input').focus();
            }
        }

        // 防审查元素右键（与主页策略保持一致）
        document.oncontextmenu = function() { return false; };
    </script>
</body>
</html>
